<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820"
     style="background:#fff; font-family:monospace; font-size:11px;">

  <!-- Title block -->
  <rect x="0" y="780" width="1200" height="40" fill="#f0f0f0" stroke="#000" stroke-width="1"/>
  <text x="600" y="797" text-anchor="middle" font-size="13" font-weight="bold">mhi2MQTT — SPI Interface Schematic (MHI CNS Port → ESP32-S3)</text>
  <text x="600" y="813" text-anchor="middle" font-size="10">Pins: MOSI=GPIO43 · MISO=GPIO44 · SCLK=GPIO38 · CS_IN=GPIO10 · CS_OUT=GPIO9</text>
  <text x="1180" y="797" text-anchor="end" font-size="10">Rev 1.0</text>
  <text x="1180" y="813" text-anchor="end" font-size="10">mhi2MQTT</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: MHI CNS CONNECTOR (J2)                       -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="80" y="30" font-weight="bold" font-size="12">J2 — MHI CNS Port</text>
  <text x="80" y="44" font-size="10" fill="#555">(JST SM 5-pin, indoor unit CN105)</text>

  <!-- Connector body -->
  <rect x="60" y="55" width="100" height="160" fill="#e8f4e8" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="75" text-anchor="middle" font-weight="bold" font-size="11">J2</text>

  <!-- Pin 1: 12V -->
  <text x="68" y="100" font-size="10">1</text>
  <line x1="90" y1="97" x2="160" y2="97" stroke="#c00" stroke-width="1.5"/>
  <text x="165" y="100" font-size="10" fill="#c00">+12V</text>

  <!-- Pin 2: GND -->
  <text x="68" y="125" font-size="10">2</text>
  <line x1="90" y1="122" x2="160" y2="122" stroke="#000" stroke-width="1.5"/>
  <text x="165" y="125" font-size="10">GND</text>

  <!-- Pin 3: SCLK -->
  <text x="68" y="150" font-size="10">3</text>
  <line x1="90" y1="147" x2="160" y2="147" stroke="#00c" stroke-width="1.5"/>
  <text x="165" y="150" font-size="10" fill="#00c">SCLK</text>

  <!-- Pin 4: MOSI -->
  <text x="68" y="175" font-size="10">4</text>
  <line x1="90" y1="172" x2="160" y2="172" stroke="#00c" stroke-width="1.5"/>
  <text x="165" y="175" font-size="10" fill="#00c">MOSI</text>

  <!-- Pin 5: MISO -->
  <text x="68" y="200" font-size="10">5</text>
  <line x1="90" y1="197" x2="160" y2="197" stroke="#060" stroke-width="1.5"/>
  <text x="165" y="200" font-size="10" fill="#060">MISO</text>

  <text x="110" y="225" text-anchor="middle" font-size="9" fill="#888">AC is SPI master</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: POWER — 12V → 5V → 3.3V                     -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="300" y="30" font-weight="bold" font-size="12">Power Supply</text>

  <!-- 12V rail from J2 pin 1 -->
  <line x1="200" y1="97" x2="290" y2="97" stroke="#c00" stroke-width="1.5"/>
  <line x1="290" y1="97" x2="290" y2="60" stroke="#c00" stroke-width="1.5"/>
  <line x1="290" y1="60" x2="460" y2="60" stroke="#c00" stroke-width="1.5"/>

  <!-- F1 fuse -->
  <rect x="310" y="50" width="40" height="20" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="330" y="64" text-anchor="middle" font-size="9">F1 1A</text>

  <!-- TPS54231DR Buck -->
  <rect x="370" y="44" width="90" height="32" fill="#ffffcc" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="58" text-anchor="middle" font-size="9" font-weight="bold">TPS54231</text>
  <text x="415" y="70" text-anchor="middle" font-size="8">Buck DC-DC</text>
  <line x1="460" y1="60" x2="500" y2="60" stroke="#c00" stroke-width="1.5"/>

  <!-- +5V rail -->
  <line x1="500" y1="44" x2="500" y2="76" stroke="#888" stroke-width="1"/>
  <line x1="500" y1="60" x2="640" y2="60" stroke="#f80" stroke-width="1.5"/>
  <text x="520" y="55" font-size="10" fill="#f80" font-weight="bold">+5V</text>

  <!-- AMS1117-3.3 LDO -->
  <rect x="560" y="44" width="80" height="32" fill="#ffffcc" stroke="#333" stroke-width="1.5"/>
  <text x="600" y="58" text-anchor="middle" font-size="9" font-weight="bold">AMS1117-3.3</text>
  <text x="600" y="70" text-anchor="middle" font-size="8">LDO Reg</text>
  <line x1="640" y1="60" x2="700" y2="60" stroke="#f80" stroke-width="1.5"/>
  <line x1="700" y1="44" x2="700" y2="76" stroke="#888" stroke-width="1"/>

  <!-- +3V3 rail -->
  <line x1="700" y1="60" x2="820" y2="60" stroke="#09f" stroke-width="1.5"/>
  <text x="730" y="55" font-size="10" fill="#09f" font-weight="bold">+3V3</text>

  <!-- GND rail from J2 pin 2 -->
  <line x1="200" y1="122" x2="250" y2="122" stroke="#000" stroke-width="1.5"/>
  <line x1="250" y1="122" x2="250" y2="770" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="235" y="770" font-size="9" fill="#555">GND bus</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: LEVEL SHIFTING — SCLK (5V→3.3V divider)     -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="300" y="140" font-weight="bold" font-size="11">SCLK Level Shift (5V → 3.3V)</text>
  <text x="300" y="153" font-size="9" fill="#555">Voltage divider: 5V × 18/(10+18) = 3.21V</text>

  <!-- Input wire from J2 -->
  <line x1="200" y1="147" x2="310" y2="147" stroke="#00c" stroke-width="1.5"/>

  <!-- R_top (10K) -->
  <rect x="310" y="138" width="50" height="18" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="335" y="150" text-anchor="middle" font-size="9">10K</text>
  <line x1="360" y1="147" x2="400" y2="147" stroke="#00c" stroke-width="1.5"/>

  <!-- Junction dot -->
  <circle cx="400" cy="147" r="3" fill="#00c"/>

  <!-- R_bot (18K) to GND -->
  <line x1="400" y1="147" x2="400" y2="185" stroke="#333" stroke-width="1.5"/>
  <rect x="376" y="185" width="48" height="18" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="400" y="197" text-anchor="middle" font-size="9">18K</text>
  <line x1="400" y1="203" x2="400" y2="215" stroke="#333" stroke-width="1.5"/>
  <!-- GND symbol -->
  <line x1="390" y1="215" x2="410" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="393" y1="219" x2="407" y2="219" stroke="#333" stroke-width="1.2"/>
  <line x1="396" y1="223" x2="404" y2="223" stroke="#333" stroke-width="1"/>

  <!-- Output to ESP32 -->
  <line x1="400" y1="147" x2="560" y2="147" stroke="#00c" stroke-width="1.5"/>
  <text x="470" y="142" text-anchor="middle" font-size="9" fill="#00c">~3.2V</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: LEVEL SHIFTING — MOSI (5V→3.3V divider)     -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="300" y="265" font-weight="bold" font-size="11">MOSI Level Shift (5V → 3.3V)</text>
  <text x="300" y="278" font-size="9" fill="#555">Identical voltage divider</text>

  <!-- Input wire from J2 -->
  <line x1="200" y1="172" x2="270" y2="172" stroke="#00c" stroke-width="1.5"/>
  <line x1="270" y1="172" x2="270" y2="295" stroke="#00c" stroke-width="1.5"/>
  <line x1="270" y1="295" x2="310" y2="295" stroke="#00c" stroke-width="1.5"/>

  <!-- R_top (10K) -->
  <rect x="310" y="286" width="50" height="18" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="335" y="298" text-anchor="middle" font-size="9">10K</text>
  <line x1="360" y1="295" x2="400" y2="295" stroke="#00c" stroke-width="1.5"/>

  <!-- Junction dot -->
  <circle cx="400" cy="295" r="3" fill="#00c"/>

  <!-- R_bot (18K) to GND -->
  <line x1="400" y1="295" x2="400" y2="335" stroke="#333" stroke-width="1.5"/>
  <rect x="376" y="335" width="48" height="18" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="400" y="347" text-anchor="middle" font-size="9">18K</text>
  <line x1="400" y1="353" x2="400" y2="365" stroke="#333" stroke-width="1.5"/>
  <line x1="390" y1="365" x2="410" y2="365" stroke="#333" stroke-width="1.5"/>
  <line x1="393" y1="369" x2="407" y2="369" stroke="#333" stroke-width="1.2"/>
  <line x1="396" y1="373" x2="404" y2="373" stroke="#333" stroke-width="1"/>

  <!-- Output to ESP32 -->
  <line x1="400" y1="295" x2="560" y2="295" stroke="#00c" stroke-width="1.5"/>
  <text x="470" y="290" text-anchor="middle" font-size="9" fill="#00c">~3.2V</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: LEVEL SHIFTING — MISO (3.3V→5V via 2N7002DW) -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="300" y="415" font-weight="bold" font-size="11">MISO Level Shift (3.3V → 5V)</text>
  <text x="300" y="428" font-size="9" fill="#555">N-ch MOSFET open-drain + 5V pull-up</text>

  <!-- From ESP32 GPIO44 → Gate -->
  <line x1="560" y1="450" x2="490" y2="450" stroke="#060" stroke-width="1.5"/>
  <text x="520" y="445" text-anchor="middle" font-size="9" fill="#060">3.3V logic</text>

  <!-- 2N7002DW symbol (simplified) -->
  <!-- Gate -->
  <line x1="448" y1="450" x2="462" y2="450" stroke="#333" stroke-width="1.5"/>
  <!-- Body -->
  <line x1="462" y1="440" x2="462" y2="460" stroke="#333" stroke-width="2"/>
  <!-- Gate-body gap -->
  <line x1="465" y1="440" x2="465" y2="460" stroke="#333" stroke-width="2"/>
  <!-- Drain (top) -->
  <line x1="465" y1="440" x2="475" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="475" y1="440" x2="475" y2="430" stroke="#333" stroke-width="1.5"/>
  <!-- Source (bot) -->
  <line x1="465" y1="460" x2="475" y2="460" stroke="#333" stroke-width="1.5"/>
  <line x1="475" y1="460" x2="475" y2="470" stroke="#333" stroke-width="1.5"/>
  <!-- Arrow (N-ch) -->
  <polygon points="467,452 474,449 474,455" fill="#333"/>

  <text x="482" y="445" font-size="9">Q1</text>
  <text x="482" y="455" font-size="8">2N7002DW</text>

  <!-- Source → GND -->
  <line x1="475" y1="470" x2="475" y2="490" stroke="#333" stroke-width="1.5"/>
  <line x1="465" y1="490" x2="485" y2="490" stroke="#333" stroke-width="1.5"/>
  <line x1="468" y1="494" x2="482" y2="494" stroke="#333" stroke-width="1.2"/>
  <line x1="471" y1="498" x2="479" y2="498" stroke="#333" stroke-width="1"/>

  <!-- Drain → junction node -->
  <line x1="475" y1="430" x2="475" y2="400" stroke="#333" stroke-width="1.5"/>
  <circle cx="475" cy="400" r="3" fill="#060"/>

  <!-- Pull-up: 10K to +5V -->
  <line x1="475" y1="400" x2="475" y2="380" stroke="#060" stroke-width="1.5"/>
  <rect x="451" y="360" width="48" height="18" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="475" y="372" text-anchor="middle" font-size="9">10K PU</text>
  <line x1="475" y1="360" x2="475" y2="350" stroke="#060" stroke-width="1.5"/>
  <line x1="475" y1="350" x2="500" y2="350" stroke="#f80" stroke-width="1.5"/>
  <line x1="500" y1="350" x2="500" y2="60" stroke="#f80" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="502" y="200" font-size="9" fill="#f80">+5V</text>

  <!-- Output wire to J2 pin 5 (left) -->
  <line x1="475" y1="400" x2="280" y2="400" stroke="#060" stroke-width="1.5"/>
  <line x1="280" y1="400" x2="280" y2="197" stroke="#060" stroke-width="1.5"/>
  <line x1="280" y1="197" x2="200" y2="197" stroke="#060" stroke-width="1.5"/>

  <!-- Gate connection from ESP32 -->
  <line x1="490" y1="450" x2="462" y2="450" stroke="#060" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: CS LOOPBACK (internal PCB trace)             -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="300" y="570" font-weight="bold" font-size="11">CS Loopback (internal PCB trace)</text>
  <text x="300" y="583" font-size="9" fill="#555">ESP32 generates CS timing; loopback feeds SPI slave peripheral</text>

  <!-- GPIO9 output -->
  <line x1="560" y1="600" x2="500" y2="600" stroke="#909" stroke-width="1.5"/>
  <line x1="500" y1="600" x2="500" y2="630" stroke="#909" stroke-width="1.5"/>
  <line x1="500" y1="630" x2="560" y2="630" stroke="#909" stroke-width="1.5"/>
  <!-- PCB trace label -->
  <rect x="490" y="608" width="120" height="14" fill="#f0e8ff" stroke="#909" stroke-width="1" rx="3"/>
  <text x="550" y="619" text-anchor="middle" font-size="9" fill="#606">PCB trace (no external signal)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: ESP32-S3 MODULE                              -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="560" y="90" width="340" height="580" fill="#fff9e8" stroke="#333" stroke-width="2" rx="6"/>
  <text x="730" y="110" text-anchor="middle" font-size="13" font-weight="bold">ESP32-S3-WROOM-1</text>
  <text x="730" y="124" text-anchor="middle" font-size="9" fill="#555">mhi2MQTT</text>

  <!-- Left-side GPIO pins (inputs from level shifters) -->
  <!-- +3V3 rail to module -->
  <line x1="820" y1="60" x2="820" y2="140" stroke="#09f" stroke-width="1.5"/>
  <line x1="820" y1="140" x2="560" y2="140" stroke="#09f" stroke-width="1.5"/>
  <text x="700" y="136" text-anchor="middle" font-size="9" fill="#09f">+3V3</text>

  <!-- GPIO38 — SCLK -->
  <line x1="560" y1="147" x2="600" y2="147" stroke="#00c" stroke-width="1.5"/>
  <text x="607" y="151" font-size="10" fill="#00c">GPIO38 (SCK_PIN)</text>
  <text x="860" y="151" font-size="9" fill="#555">← SCLK from AC</text>

  <!-- GPIO43 — MOSI -->
  <line x1="560" y1="295" x2="600" y2="295" stroke="#00c" stroke-width="1.5"/>
  <text x="607" y="299" font-size="10" fill="#00c">GPIO43 (MOSI_PIN)</text>
  <text x="860" y="299" font-size="9" fill="#555">← MOSI from AC</text>

  <!-- GPIO44 — MISO -->
  <line x1="560" y1="450" x2="600" y2="450" stroke="#060" stroke-width="1.5"/>
  <text x="607" y="454" font-size="10" fill="#060">GPIO44 (MISO_PIN)</text>
  <text x="860" y="454" font-size="9" fill="#555">→ MISO to AC</text>

  <!-- GPIO9 — CS_OUT -->
  <line x1="560" y1="600" x2="600" y2="600" stroke="#909" stroke-width="1.5"/>
  <text x="607" y="604" font-size="10" fill="#909">GPIO9  (CS_OUT_PIN)</text>
  <text x="860" y="604" font-size="9" fill="#555">→ loopback to CS_IN</text>

  <!-- GPIO10 — CS_IN -->
  <line x1="560" y1="630" x2="600" y2="630" stroke="#909" stroke-width="1.5"/>
  <text x="607" y="634" font-size="10" fill="#909">GPIO10 (CS_IN_PIN)</text>
  <text x="860" y="634" font-size="9" fill="#555">← CS (from loopback)</text>

  <!-- Other GPIOs (LEDs, Button, Buzzer) -->
  <text x="620" y="700" font-size="10">GPIO5  (LED_PWR)</text>
  <text x="620" y="716" font-size="10">GPIO6  (LED_ACT)</text>
  <text x="620" y="732" font-size="10">GPIO0  (BTN_1 / BOOT)</text>
  <text x="620" y="748" font-size="10">GPIO14 (BUZZER)</text>
  <text x="620" y="764" font-size="10">GPIO43 (U0TXD) — debug UART TX</text>

  <!-- SPI2_HOST label -->
  <rect x="575" y="160" width="220" height="22" fill="#e8f0ff" stroke="#88a" stroke-width="1" rx="3"/>
  <text x="685" y="175" text-anchor="middle" font-size="9" fill="#446">SPI2_HOST slave — FreeRTOS task (mhi_ac::init)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: BUZZER + LEDS (right side, condensed)        -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="940" y="590" font-weight="bold" font-size="11">Peripherals</text>
  <!-- Buzzer -->
  <rect x="940" y="600" width="100" height="30" fill="#ffe8e8" stroke="#933" stroke-width="1.5" rx="4"/>
  <text x="990" y="620" text-anchor="middle" font-size="10">LS1 CMT-7525</text>
  <line x1="900" y1="615" x2="940" y2="615" stroke="#933" stroke-width="1.5"/>
  <!-- LED PWR -->
  <rect x="940" y="640" width="100" height="24" fill="#e8ffe8" stroke="#393" stroke-width="1.5" rx="4"/>
  <text x="990" y="656" text-anchor="middle" font-size="10">D2 LED_PWR</text>
  <line x1="900" y1="652" x2="940" y2="652" stroke="#393" stroke-width="1.5"/>
  <!-- LED ACT -->
  <rect x="940" y="672" width="100" height="24" fill="#e8ffe8" stroke="#393" stroke-width="1.5" rx="4"/>
  <text x="990" y="688" text-anchor="middle" font-size="10">D3 LED_ACT</text>
  <line x1="900" y1="684" x2="940" y2="684" stroke="#393" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: USB-C (bottom left, simplified)              -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="60" y="590" width="120" height="70" fill="#e8e8ff" stroke="#336" stroke-width="1.5" rx="4"/>
  <text x="120" y="610" text-anchor="middle" font-size="10" font-weight="bold">J1 USB-C</text>
  <text x="120" y="625" text-anchor="middle" font-size="9">USB2.0 Receptacle</text>
  <text x="120" y="640" text-anchor="middle" font-size="9">D+/D− → ESP32</text>
  <text x="120" y="655" text-anchor="middle" font-size="9">VBUS → 5V supply</text>
  <text x="60" y="678" font-size="9" fill="#555">* USB used for</text>
  <text x="60" y="690" font-size="9" fill="#555">  flashing &amp; debug</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- LEGEND                                                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="940" y="55" width="240" height="130" fill="#f8f8f8" stroke="#aaa" stroke-width="1" rx="4"/>
  <text x="1060" y="72" text-anchor="middle" font-weight="bold" font-size="11">Signal Legend</text>
  <line x1="950" y1="88" x2="990" y2="88" stroke="#c00" stroke-width="2"/>
  <text x="998" y="92" font-size="10">Power (+12V)</text>
  <line x1="950" y1="106" x2="990" y2="106" stroke="#f80" stroke-width="2"/>
  <text x="998" y="110" font-size="10">+5V rail</text>
  <line x1="950" y1="124" x2="990" y2="124" stroke="#09f" stroke-width="2"/>
  <text x="998" y="128" font-size="10">+3V3 rail</text>
  <line x1="950" y1="142" x2="990" y2="142" stroke="#00c" stroke-width="2"/>
  <text x="998" y="146" font-size="10">SPI input (AC→ESP32)</text>
  <line x1="950" y1="160" x2="990" y2="160" stroke="#060" stroke-width="2"/>
  <text x="998" y="164" font-size="10">SPI output (ESP32→AC)</text>
  <line x1="950" y1="178" x2="990" y2="178" stroke="#909" stroke-width="2"/>
  <text x="998" y="182" font-size="10">CS loopback (internal)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- NOTE BOX                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="940" y="200" width="240" height="170" fill="#fffbe6" stroke="#ca0" stroke-width="1" rx="4"/>
  <text x="1060" y="218" text-anchor="middle" font-weight="bold" font-size="11">Design Notes</text>
  <text x="948" y="234" font-size="9">• AC drives SCLK — ESP32 is SPI slave</text>
  <text x="948" y="248" font-size="9">• No CS from AC; ESP32 synthesizes CS</text>
  <text x="948" y="262" font-size="9">  from SCLK idle time (gptimer)</text>
  <text x="948" y="276" font-size="9">• CS_OUT→CS_IN: PCB trace, no external</text>
  <text x="948" y="290" font-size="9">• SCLK/MOSI: 5V logic → resistor divider</text>
  <text x="948" y="304" font-size="9">  (10K + 18K) → ~3.21V safe for GPIO</text>
  <text x="948" y="318" font-size="9">• MISO: 3.3V GPIO → 2N7002DW open-drain</text>
  <text x="948" y="332" font-size="9">  + 10K pull-up to 5V</text>
  <text x="948" y="346" font-size="9">• GPIO glitch filter enabled on SCLK</text>
  <text x="948" y="360" font-size="9">  (SOC_GPIO_SUPPORT_PIN_GLITCH_FILTER)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SECTION: SW1 / SW2 buttons                            -->
